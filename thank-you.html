<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="Thank you for subscribing to Synthrun's Architecture Checklist.">
  <title>You're in. — Synthrun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --white: #fafaf8;
      --off: #f2f1ee;
      --ink: #111110;
      --ink2: #3a3a38;
      --ink3: #888884;
      --ink4: #c4c4be;
      --rule: #e0dfd9;
      --accent: #111110;
      --nav-bg: rgba(250,250,248,0.94);
      --surface: rgba(255,255,255,0.75);
      --glow: radial-gradient(circle at 20% 20%, rgba(17,17,16,0.08), rgba(17,17,16,0) 55%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --white: #101114;
        --off: #181a1f;
        --ink: #eceae2;
        --ink2: #c4c0b5;
        --ink3: #989388;
        --ink4: #646055;
        --rule: #2b2e35;
        --accent: #eceae2;
        --nav-bg: rgba(16,17,20,0.9);
        --surface: rgba(24,26,31,0.82);
        --glow: radial-gradient(circle at 20% 20%, rgba(236,234,226,0.08), rgba(236,234,226,0) 55%);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: 'DM Mono', monospace; background: var(--white); color: var(--ink); }
    body {
      min-height: 100vh;
      background: var(--white);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    main {
      max-width: 40rem;
      width: 100%;
    }
    .page-icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1.5rem;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--surface);
      border: 1px solid var(--rule);
      color: var(--accent);
    }
    .page-icon svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      margin-bottom: 1rem;
      font-family: 'Fraunces', serif;
      font-size: clamp(2.2rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    p {
      margin-bottom: 2rem;
      color: var(--ink2);
      font-size: 1rem;
      line-height: 1.8;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.6rem;
      border: 1px solid var(--rule);
      border-radius: 0.35rem;
      background: var(--surface);
      color: var(--ink);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: transform 0.25s ease, background 0.25s ease;
    }
    a:hover {
      transform: translateY(-1px);
      background: var(--off);
    }
  </style>
</head>
<body>
  <main>
    <div class="page-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"></path></svg>
    </div>
    <h1>You're in.</h1>
    <p>The Architecture Checklist is on its way to your inbox. If you do not see it soon, please check your spam folder.</p>
    <a href="/">Back to Synthrun</a>
  </main>
</body>
</html>
